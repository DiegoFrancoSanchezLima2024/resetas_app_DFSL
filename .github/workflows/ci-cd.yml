name: CI/CD Recetas App

# Se ejecuta automáticamente con cada push o pull request a main
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────
  # JOB 1: Tests del backend (Node.js + Jest)
  # ─────────────────────────────────────────
  test-backend:
    name: "Backend — Tests"
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Instalar dependencias
        working-directory: backend
        run: npm install

      - name: Ejecutar tests
        working-directory: backend
        run: npm test

  # ────────────────────────────────────────────
  # JOB 2: Build del frontend (React + Vite)
  # ────────────────────────────────────────────
  build-frontend:
    name: "Frontend — Build"
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Instalar dependencias
        working-directory: frontend
        run: npm install

      - name: Build de producción
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: Guardar build como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/dist/

  # ────────────────────────────────────────────────────────
  # JOB 3: Deploy (solo si tests y build pasaron)
  # ────────────────────────────────────────────────────────
  deploy:
    name: "Deploy a Producción"
    runs-on: ubuntu-latest
    needs: [test-backend, build-frontend]  # depende de ambos jobs anteriores
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    env:
      RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
      VERCEL_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}

    steps:
      - name: Verificar secret de Render
        if: ${{ env.RENDER_DEPLOY_HOOK_URL == '' }}
        run: echo "ℹ️ No se configuró RENDER_DEPLOY_HOOK_URL. Se omite deploy de backend."

      - name: Trigger deploy backend en Render
        if: ${{ env.RENDER_DEPLOY_HOOK_URL != '' }}
        run: |
          curl --fail --show-error --silent -X POST "$RENDER_DEPLOY_HOOK_URL"
          echo "✅ Deploy del backend disparado en Render"

      - name: Trigger deploy frontend en Vercel (opcional)
        if: ${{ env.VERCEL_DEPLOY_HOOK_URL != '' }}
        run: |
          curl -X POST "$VERCEL_DEPLOY_HOOK_URL"
          echo "✅ Deploy del frontend disparado en Vercel"

      - name: Aviso si no existe hook de Vercel
        if: ${{ env.VERCEL_DEPLOY_HOOK_URL == '' }}
        run: echo "ℹ️ No se configuró VERCEL_DEPLOY_HOOK_URL. El frontend puede desplegarse con integración nativa de Vercel."

      - name: Notificar resultado
        run: |
          echo "🚀 Pipeline completado:"
          echo "   ✅ Tests pasaron"
          echo "   ✅ Build exitoso"
          echo "   ✅ Deploy backend disparado"
